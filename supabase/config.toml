# ============================================================
# AtomQuest 1.0 — Supabase Local Dev Configuration
# ============================================================
# Run: supabase start (requires Docker)
# Docs: https://supabase.com/docs/guides/cli/config
# ============================================================

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""

[realtime]
enabled = true

[storage]
enabled = false

[edge_runtime]
enabled = false
